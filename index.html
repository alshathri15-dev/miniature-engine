<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توقعات كأس العالم 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  .team-flag { font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", "Twemoji Mozilla", sans-serif !important; }
  .pred-btn { font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", "Tajawal", sans-serif !important; }
  .pred-chip { font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", sans-serif !important; }
  .predictions-preview { font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", "Tajawal", sans-serif !important; }
</style>
<style>
  :root {
    --bg: #0A0F1C; --card: #111827; --card2: #1A2744; --gold: #C9A84C;
    --gold-light: #E8C96E; --text: #E8EDF5; --muted: #8892A4;
    --green: #2ECC71; --red: #E74C3C; --draw: #F39C12; --border: rgba(201,168,76,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--text); min-height:100vh;
    background-image: radial-gradient(ellipse at 20% 50%,rgba(201,168,76,0.04) 0%,transparent 60%), radial-gradient(ellipse at 80% 20%,rgba(26,39,68,0.8) 0%,transparent 50%);
  }
  header { text-align:center; padding:36px 20px 16px; }
  .trophy-row { font-size:44px; margin-bottom:6px; filter:drop-shadow(0 0 20px rgba(201,168,76,0.5)); }
  header h1 {
    font-size:clamp(26px,6vw,44px); font-weight:900;
    background:linear-gradient(135deg,var(--gold-light),var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  header p { color:var(--muted); font-size:13px; margin-top:4px; }
  #live-clock { font-size:12px; color:var(--muted); margin-top:8px; direction:ltr; }
  .container { max-width:680px; margin:0 auto; padding:0 16px 80px; }

  #register-section { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:30px 24px; margin:20px 0; text-align:center; position:relative; overflow:hidden; }
  #register-section::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  #register-section h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
  #register-section p { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .input-row { display:flex; gap:10px; max-width:360px; margin:0 auto; }
  .input-row input { flex:1; background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-family:'Tajawal',sans-serif; font-size:16px; outline:none; transition:border-color 0.2s; }
  .input-row input:focus { border-color:var(--gold); }
  .btn-gold { background:linear-gradient(135deg,var(--gold),#a8853a); color:#0A0F1C; font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; border:none; border-radius:12px; padding:12px 22px; cursor:pointer; transition:opacity 0.2s,transform 0.1s; white-space:nowrap; }
  .btn-gold:hover { opacity:0.9; transform:translateY(-1px); }

  #welcome-badge { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 18px; margin:0 0 18px; display:flex; align-items:center; justify-content:space-between; }
  #welcome-badge .left { display:flex; align-items:center; gap:10px; }
  .avatar { width:38px; height:38px; background:linear-gradient(135deg,var(--gold),#a8853a); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:#0A0F1C; }
  .points-pill { background:var(--card2); border:1px solid var(--border); padding:6px 14px; border-radius:20px; font-size:14px; font-weight:700; color:var(--gold); }

  .tabs { display:flex; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:4px; margin-bottom:18px; }
  .tab-btn { flex:1; background:transparent; border:none; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:600; color:var(--muted); padding:10px; border-radius:10px; cursor:pointer; transition:all 0.2s; }
  .tab-btn.active { background:var(--card2); color:var(--gold); }

  .section-title { display:flex; align-items:center; gap:10px; margin:20px 0 12px; font-size:12px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

  .match-card { background:var(--card); border:1px solid var(--border); border-radius:18px; margin-bottom:12px; overflow:hidden; transition:transform 0.2s; }
  .match-header { background:var(--card2); padding:9px 14px; display:flex; align-items:center; justify-content:space-between; font-size:12px; }
  .match-header .group { color:var(--gold); font-weight:700; }
  .match-header .time { color:var(--muted); direction:ltr; }
  .status-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .status-open { background:rgba(46,204,113,0.15); color:var(--green); }
  .status-closed { background:rgba(231,76,60,0.15); color:#E74C3C; }

  .match-body { padding:16px 14px; }
  .teams-row { display:flex; align-items:center; justify-content:space-between; }
  .team { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; }
  .team-flag { font-size:34px; }
  .team-name { font-size:14px; font-weight:700; }
  .vs-box { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .vs-text { font-size:11px; color:var(--muted); }
  .countdown-box { font-size:11px; color:var(--draw); direction:ltr; font-family:monospace; font-weight:bold; }

  .predict-row { display:flex; gap:8px; margin-top:14px; }
  .pred-btn { flex:1; background:var(--card2); border:1.5px solid transparent; border-radius:10px; padding:10px 4px; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:13px; font-weight:700; color:var(--text); display:flex; flex-direction:column; align-items:center; }
  .pred-btn .label { font-size:11px; font-weight:400; color:var(--muted); }
  .pred-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .pred-btn.selected-home { border-color:var(--green); background:rgba(46,204,113,0.1); color:var(--green); }
  .pred-btn.selected-draw { border-color:var(--draw); background:rgba(243,156,18,0.1); color:var(--draw); }
  .pred-btn.selected-away { border-color:var(--red); background:rgba(231,76,60,0.1); color:var(--red); }

  .predictions-preview { padding:9px 14px 12px; border-top:1px solid rgba(255,255,255,0.05); display:flex; flex-wrap:wrap; gap:6px; align-items:center; background: rgba(0,0,0,0.15); }
  .pred-label { font-size:11px; color:var(--muted); font-weight:bold; margin-left:4px; }
  .pred-chip { font-size:11px; padding:4px 10px; border-radius:20px; font-weight:600; line-height:1.4; }
  .chip-home { background:rgba(46,204,113,0.15); color:var(--green); border: 1px solid rgba(46,204,113,0.3); }
  .chip-draw { background:rgba(243,156,18,0.15); color:var(--draw); border: 1px solid rgba(243,156,18,0.3); }
  .chip-away { background:rgba(231,76,60,0.15); color:var(--red); border: 1px solid rgba(231,76,60,0.3); }

  .lb-row { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:8px; }
  .lb-rank { font-size:18px; font-weight:900; width:28px; text-align:center; color:var(--muted); }
  .lb-avatar { width:36px; height:36px; background:var(--card2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; color:var(--gold); }
  .lb-name { flex:1; font-size:15px; font-weight:600; }
  .lb-pts { font-size:18px; font-weight:900; color:var(--gold); }

  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 24px; font-size:14px; font-weight:600; transition:transform 0.3s; z-index:999; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.success { border-color:var(--green); color:var(--green); }
  #toast.error { border-color:var(--red); color:var(--red); }

  #setup-screen { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 22px; margin:20px 0; }
  .setup-input { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-family:'Tajawal',sans-serif; margin-bottom:10px; direction:ltr; }
  .step-badge { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:var(--gold); color:#0A0F1C; font-size:12px; font-weight:900; margin-left:8px; }
  .step-row { display:flex; margin-bottom:16px; }

  .admin-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px; }
  .ko-round-title { font-size:13px; font-weight:700; color:var(--gold); margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
  .ko-round-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .ko-result-select { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:7px 10px; color:var(--text); font-family:'Tajawal',sans-serif; font-size:12px; }
  .ko-save-btn { background:rgba(201,168,76,0.15); border:1px solid var(--border); border-radius:8px; padding:7px 12px; color:var(--gold); font-weight:700; cursor:pointer; transition:all 0.2s; }
  .ko-save-btn:hover { background:rgba(201,168,76,0.3); }

  /* BRACKET */
  .bracket-wrap { overflow-x: auto; padding: 0 0 20px; direction: ltr; }
  .bracket { display: flex; padding: 12px 8px; }
  .bracket-round-col { display: flex; flex-direction: column; min-width: 175px; }
  .bracket-round-header { font-size: 11px; font-weight: 700; color: var(--gold); text-align: center; padding: 6px 8px 10px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .bracket-round-matches { display: flex; flex-direction: column; flex: 1; justify-content: space-around; }
  .bracket-connector-col { display: flex; flex-direction: column; width: 24px; padding-top: 28px; }
  .bracket-conn-pair { display: flex; flex-direction: column; flex: 1; justify-content: space-around; position: relative; }
  .bracket-conn-pair::before { content: ''; position: absolute; right: 0; top: 25%; bottom: 25%; width: 1px; background: var(--border); }
  .bracket-conn-line { height: 1px; background: var(--border); width: 100%; }
  
  .bm { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 3px 6px; cursor: pointer; min-width: 160px; transition:all 0.2s; }
  .bm.open { border-color: rgba(46,204,113,0.5); }
  .bm.final-match { border-color: var(--gold); box-shadow: 0 0 16px rgba(201,168,76,0.3); }
  
  .bm-date { display:flex; justify-content:space-between; align-items:center; font-size: 10px; color: var(--muted); padding: 4px 8px 2px; border-bottom: 1px solid rgba(255,255,255,0.04); direction: ltr; }
  .mini-cd { color: var(--draw); font-family: monospace; font-weight: bold; }
  
  .bm-team { display: flex; align-items: center; gap: 7px; padding: 6px 8px; font-size: 12px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.04); min-height: 28px; direction: ltr; }
  .bm-team.winner { background: rgba(46,204,113,0.1); color: var(--green); }
  .bm-team.loser { opacity: 0.4; }
  .bm-team.my-pick { background: rgba(201,168,76,0.07); }
  .bm-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
  .bm-dot.win { background: var(--green); }
  .bm-dot.my { background: var(--gold); }
  .bm-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .ko-detail-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin: 10px 0 14px; direction: rtl; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .ko-detail-title { font-size:15px; font-weight:700; margin-bottom:14px; text-align:center; }
  .ko-pred-row { display:flex; gap:8px; margin-top:12px; }
  .ko-pred-btn { flex:1; background:var(--card2); border:1.5px solid transparent; border-radius:10px; padding:10px 4px; cursor:pointer; font-family:'Tajawal'; font-size:13px; font-weight:700; color:var(--text); display:flex; flex-direction:column; align-items:center; }
  .ko-pred-btn.sel-1 { border-color:var(--green); background:rgba(46,204,113,0.1); color:var(--green); }
  .ko-pred-btn.sel-2 { border-color:var(--red); background:rgba(231,76,60,0.1); color:var(--red); }
</style>
</head>
<body>

<header>
  <div class="trophy-row">🏆</div>
  <h1>توقعات كأس العالم 2026</h1>
  <p>توقّع نتائج المباريات وتنافس مع أصحابك</p>
  <div id="live-clock"></div>
</header>

<div class="container">
  <div id="setup-screen" style="display:none">
    <h2>⚙️ إعداد أول مرة</h2>
    <div class="step-row"><span class="step-badge">1</span><div style="flex:1"><label>انسخ الكود أدناه وضعه في Google Apps Script</label><button class="btn-gold" onclick="copyAppsScript()" style="width:100%;margin:6px 0">نسخ كود Apps Script</button></div></div>
    <div class="step-row"><span class="step-badge">2</span><div style="flex:1"><label>انشر السكربت كـ Web App وانسخ الرابط هنا:</label><input class="setup-input" id="api-url-input" placeholder="https://script.google.com/macros/s/..." /></div></div>
    <button class="btn-gold" onclick="saveSetup()" style="width:100%">حفظ والبدء</button>
  </div>

  <div id="register-section" style="display:none">
    <h2>انضم للتحدي</h2>
    <p>أدخل اسمك وابدأ التوقعات</p>
    <div class="input-row"><input type="text" id="name-input" placeholder="اسمك هنا..." maxlength="24" /><button class="btn-gold" onclick="registerUser()">دخول</button></div>
  </div>

  <div id="welcome-badge" style="display:none">
    <div class="left"><div class="avatar" id="avatar-letter">؟</div><div><div style="font-weight:700;font-size:16px" id="display-name">-</div><div style="font-size:12px;color:var(--muted)">جاهز للتوقع؟</div></div></div>
    <div class="points-pill" id="points-display">0 نقطة</div>
  </div>

  <div class="tabs" id="main-tabs" style="display:none">
    <button class="tab-btn active" onclick="switchTab('matches')">المباريات</button>
    <button class="tab-btn" onclick="switchTab('knockout')">الإقصائية</button>
    <button class="tab-btn" onclick="switchTab('leaderboard')">الترتيب</button>
    <button class="tab-btn" onclick="switchTab('admin')">⚙️ إدارة</button>
  </div>

  <div id="tab-matches" style="display:none"><div class="section-title">المباريات</div><div id="matches-list"></div></div>
  <div id="tab-leaderboard" style="display:none"><div class="section-title">لوحة الترتيب</div><div id="leaderboard-list"></div></div>
  <div id="tab-knockout" style="display:none"><div class="section-title">مرحلة خروج المغلوب</div><div id="knockout-list"></div></div>
  
  <div id="tab-admin" style="display:none">
    <div class="admin-card">
      <h3>🔑 دخول الإدارة</h3>
      <div id="results-admin"></div>
      <hr style="border-color:var(--border);margin:20px 0">
      <h3>🏆 أدوار خروج المغلوب</h3>
      <div id="knockout-admin"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

function fetchData() {
  if (!API_URL) return;
  const cbName = 'wc_cb_' + Date.now(); const script = document.createElement('script');
  window[cbName] = function(json) {
    delete window[cbName]; script.remove();
    remoteData.predictions = json.predictions || {}; remoteData.results = json.results || {}; remoteData.koMatches = json.koMatches || []; remoteData.knockoutPreds = json.knockoutPreds || {};
    MATCHES.forEach(m => { m.result = remoteData.results[m.id] || null; });
    renderMatches(); renderLeaderboard(); renderKnockout(); if(document.getElementById('tab-admin').style.display === 'block') { renderResultsAdmin(); renderKnockoutAdmin(); }
    updatePointsBadge();
  };
  script.src = API_URL + '?callback=' + cbName + '&t=' + Date.now(); document.head.appendChild(script);
}

async function apiPost(payload) {
  const cbName = 'wc_post_' + Date.now(); const script = document.createElement('script');
  return new Promise(resolve => {
    window[cbName] = (json) => { delete window[cbName]; script.remove(); resolve(!!json?.ok); };
    script.src = API_URL + '?callback=' + cbName + '&payload=' + encodeURIComponent(JSON.stringify(payload)) + '&t=' + Date.now();
    script.onerror = () => resolve(false); document.head.appendChild(script);
  }).then(async res => { if(res) await fetchData(); return res; });
}

function getMatchStatus(iso) { return (new Date(iso).getTime() - 3600000 - Date.now() > 0) ? 'open' : 'closed'; }
function formatCountdown(iso) {
  const diff = new Date(iso).getTime() - 3600000 - Date.now();
  if (diff <= 0) return '';
  const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtArabicDate(iso) {
  const d = new Date(iso); const m = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'][d.getMonth()];
  let h = d.getHours(); const am = h >= 12 ? 'م' : 'ص'; h = h % 12 || 12;
  return `${d.getDate()} ${m} · ${h}:${String(d.getMinutes()).padStart(2,'0')} ${am}`;
}

function statusLabel(st) { return st === 'open' ? '<span class="status-badge status-open">مفتوح للتوقع ✓</span>' : '<span class="status-badge status-closed">أغلقت التوقعات 🔒</span>'; }

          ${hNames.length ? `<span class="pred-chip chip-home">${m.team1.flag} ${hNames.length}</span>` : ''}
          ${dNames.length ? `<span class="pred-chip chip-draw">🤝 ${dNames.length}</span>` : ''}
          ${aNames.length ? `<span class="pred-chip chip-away">${m.team2.flag} ${aNames.length}</span>` : ''}
        ` : `
          ${hNames.length ? `<span class="pred-chip chip-home">${m.team1.flag} ${hNames.join('، ')}</span>` : ''}
          ${dNames.length ? `<span class="pred-chip chip-draw">🤝 ${dNames.join('، ')}</span>` : ''}
          ${aNames.length ? `<span class="pred-chip chip-away">${m.team2.flag} ${aNames.join('، ')}</span>` : ''}
        `}
      </div>` : '';

    return `<div class="match-card"><div class="match-header"><span class="group">${m.group}</span>${statusLabel(getMatchStatus(m.kickoff))}</div><div class="match-body"><div class="teams-row"><div class="team"><div class="team-flag">${m.team1.flag}</div><div class="team-name">${m.team1.name}</div></div><div class="vs-text">VS</div><div class="team"><div class="team-flag">${m.team2.flag}</div><div class="team-name">${m.team2.name}</div></div></div><div class="predict-row"><button class="pred-btn ${preds[currentUser]==='home'?'selected-home':''}" ${!isOpen?'disabled':''} onclick="predict('${m.id}','home')">${m.team1.name}</button><button class="pred-btn ${preds[currentUser]==='draw'?'selected-draw':''}" ${!isOpen?'disabled':''} onclick="predict('${m.id}','draw')">تعادل</button><button class="pred-btn ${preds[currentUser]==='away'?'selected-away':''}" ${!isOpen?'disabled':''} onclick="predict('${m.id}','away')">${m.team2.name}</button></div>${resBanner}</div>${predsBox}</div>`;
  }).join('');
}

let activeKOMatch = null;
function renderKnockout() {
  const c = document.getElementById('knockout-list'); if(!c) return;
  const byId = Object.fromEntries((remoteData.koMatches||[]).map(m => [m.id, m]));
  const ROUNDS = [{id:'r32',label:'دور الـ32',ids:BRACKET.filter(b=>b.round==='r32').map(b=>b.id)},{id:'r16',label:'دور الـ16',ids:BRACKET.filter(b=>b.round==='r16').map(b=>b.id)},{id:'qf',label:'ربع النهائي',ids:BRACKET.filter(b=>b.round==='qf').map(b=>b.id)},{id:'sf',label:'نصف النهائي',ids:BRACKET.filter(b=>b.round==='sf').map(b=>b.id)},{id:'tp',label:'مباراة الثالث 🥉',ids:['M103']},{id:'f',label:'النهائي الكبير 🏆',ids:['M104']}];

  c.innerHTML = '<div class="bracket-wrap"><div class="bracket">' + ROUNDS.map(r => `<div class="bracket-round-col"><div class="bracket-round-header">${r.label}</div><div class="bracket-round-matches">` + r.ids.map(mid => {
    const bm = BRACKET_BY_ID[mid]; const m = byId[mid] || {}; const res = String(m.result||''); const kickoff = m.kickoff || bm.date; const isOpen = getMatchStatus(kickoff) === 'open'; const cd = isOpen ? formatCountdown(kickoff) : '';
    const kPreds = (remoteData.knockoutPreds||{})[mid] || {}; const uPick = currentUser ? String(kPreds[currentUser]||'') : '';
    const win1 = res==='1' ? 'winner' : uPick==='1' ? 'my-pick' : ''; const win2 = res==='2' ? 'winner' : uPick==='2' ? 'my-pick' : '';

    return `<div class="bm ${isOpen&&!res?'open':''}${mid==='M104'?' final-match':''}" onclick="activeKOMatch='${mid}';renderKODetail()">
      <div class="bm-date"><span>${fmtArabicDate(kickoff)}</span>${cd ? `<span class="mini-cd" id="kocd_${mid}">${cd}</span>` : (!isOpen ? '<span style="color:#E74C3C">🔒</span>' : '')}</div>
      <div class="bm-team ${win1}"><div class="bm-dot ${res==='1'?'win':uPick==='1'?'my':''}"></div><span class="bm-name">${m.team1||bm.t1}</span></div>
      <div class="bm-team ${win2}"><div class="bm-dot ${res==='2'?'win':uPick==='2'?'my':''}"></div><span class="bm-name">${m.team2||bm.t2}</span></div>
    </div>`;
  }).join('') + '</div></div>').join('') + '</div></div><div id="ko-detail-mount"></div>';
  renderKODetail();
}

function renderKODetail() {
  const mount = document.getElementById('ko-detail-mount'); if(!mount||!activeKOMatch) return;
  const bm = BRACKET_BY_ID[activeKOMatch]; const m = (remoteData.koMatches||[]).find(x => x.id === activeKOMatch) || {}; 
  const kickoff = m.kickoff || bm.date; const isOpen = getMatchStatus(kickoff) === 'open'; const cd = isOpen ? formatCountdown(kickoff) : ''; const res = String(m.result||'');
  const t1 = m.team1 || bm.t1, t2 = m.team2 || bm.t2;
  const kPreds = (remoteData.knockoutPreds||{})[activeKOMatch] || {}; const uPick = currentUser ? String(kPreds[currentUser]||'') : '';
  const team1names = Object.entries(kPreds).filter(([,p])=>String(p)==='1').map(([n])=>n);
  const team2names = Object.entries(kPreds).filter(([,p])=>String(p)==='2').map(([n])=>n);
  const tot = team1names.length + team2names.length;

  mount.innerHTML = `<div class="ko-detail-panel"><div class="ko-detail-title">${bm.id} <span style="font-size:12px;color:var(--muted);display:block">${fmtArabicDate(kickoff)} بتوقيتنا</span></div><div style="display:flex;align-items:center;justify-content:space-around;margin-bottom:14px"><div style="text-align:center;flex:1"><div style="font-size:17px;font-weight:900;${res==='1'?'color:var(--green)':''}">${t1}</div></div><div style="text-align:center;min-width:90px"><span style="color:var(--muted);font-size:11px">VS</span>${cd ? `<div class="countdown-box" id="kodet_${activeKOMatch}" style="margin-top:2px">${cd}</div>` : (!isOpen ? `<div style="color:#E74C3C;font-size:11px;margin-top:2px;font-weight:bold">أغلقت 🔒</div>` : '')}</div><div style="text-align:center;flex:1"><div style="font-size:17px;font-weight:900;${res==='2'?'color:var(--green)':''}">${t2}</div></div></div>${isOpen && !res ? `<div class="ko-pred-row"><button class="ko-pred-btn ${uPick==='1'?'sel-1':''}" onclick="predictKO('${activeKOMatch}','1')">${t1} <span class="label">يفوز</span></button><button class="ko-pred-btn ${uPick==='2'?'sel-2':''}" onclick="predictKO('${activeKOMatch}','2')">${t2} <span class="label">يفوز</span></button></div>` : ''}${tot > 0 ? (!isOpen ? `<div class="predictions-preview" style="margin-top:14px;border-radius:12px">${team1names.length ? `<span class="pred-chip chip-home">${t1}: ${team1names.join('، ')}</span>` : ''}${team2names.length ? `<span class="pred-chip chip-away">${t2}: ${team2names.join('، ')}</span>` : ''}</div>` : `<div style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">توقعات مسجلة: ${tot}</div>`) : ''}</div>`;
}

async function predictKO(matchId, choice) {
  if(!currentUser) return showToast('سجل اسمك أولاً','error');
  await apiPost({ action:'predictKnockout', matchId, user:currentUser, prediction:String(choice) }); showToast('تم الحفظ ✓');
}

function calcPoints(u) {
  let pts = 0; MATCHES.forEach(m => { if(m.result && (remoteData.predictions[m.id]||{})[u] === m.result) pts += 3; });
  (remoteData.koMatches||[]).forEach(m => { if(m.result && String((remoteData.knockoutPreds||{})[m.id]?.[u]) === String(m.result)) pts += 3; }); return pts;
}

function renderLeaderboard() {
  const c = document.getElementById('leaderboard-list'); if(!c) return;
  const users = [...new Set([...Object.values(remoteData.predictions).flatMap(Object.keys), ...Object.values(remoteData.knockoutPreds).flatMap(Object.keys)])].map(u => ({name:u, pts:calcPoints(u)})).sort((a,b)=>b.pts-a.pts);
  c.innerHTML = users.map((u,i) => `<div class="lb-row"><div class="lb-rank">${i+1}</div><div class="lb-avatar">${u.name[0]}</div><div class="lb-name">${u.name}</div><div class="lb-pts">${u.pts} نقطة</div></div>`).join('');
}

function updatePointsBadge() {
  if (currentUser) { const el = document.getElementById('points-display'); if (el) el.textContent = calcPoints(currentUser) + ' نقطة'; }
}

function renderResultsAdmin() {
  const c = document.getElementById('results-admin'); if(!c) return;
  c.innerHTML = MATCHES.map(m => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span style="font-size:13px;flex:1;">${m.team1.name} vs ${m.team2.name}</span><select onchange="setResult('${m.id}', this.value)" class="ko-result-select"><option value="">-- النتيجة --</option><option value="home" ${m.result==='home'?'selected':''}>فوز ${m.team1.name}</option><option value="draw" ${m.result==='draw'?'selected':''}>تعادل</option><option value="away" ${m.result==='away'?'selected':''}>فوز ${m.team2.name}</option></select></div>`).join('');
}

async function setResult(matchId, result) {
  const match = MATCHES.find(m => m.id === matchId); if (match) match.result = result;
  remoteData.results[matchId] = result;
  renderMatches(); renderLeaderboard(); updatePointsBadge();
  await apiPost({ action:'setResult', matchId, result }); showToast('تم تسجيل النتيجة ✓');
}

function renderKnockoutAdmin() {
  const c = document.getElementById('knockout-admin'); if(!c) return;
  const byId = Object.fromEntries((remoteData.koMatches||[]).map(m => [m.id, m]));
  const ROUNDS = [{id:'r32',label:'دور الـ32'},{id:'r16',label:'دور الـ16'},{id:'qf',label:'ربع النهائي'},{id:'sf',label:'نصف النهائي'},{id:'tp',label:'المركز الثالث'},{id:'f',label:'النهائي الكبير'}];

  c.innerHTML = ROUNDS.map(r => `<div class="ko-round-title">${r.label}</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px">` + (BRACKET_SLOTS[r.id]||[]).map(slotId => {
    const m = byId[slotId] || {}; const bm = BRACKET_BY_ID[slotId];
    return `<div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px">
      <span style="font-size:11px;color:var(--gold);font-weight:bold">${slotId}</span>
      <select id="at1_${slotId}" class="ko-result-select"><option value="">-- الفريـق 1 --</option>${ALL_TEAMS.map(t=>`<option value="${t}" ${t===(m.team1||bm.t1)?'selected':''}>${t}</option>`).join('')}</select>
      <select id="at2_${slotId}" class="ko-result-select"><option value="">-- الفريـق 2 --</option>${ALL_TEAMS.map(t=>`<option value="${t}" ${t===(m.team2||bm.t2)?'selected':''}>${t}</option>`).join('')}</select>
      <select id="ares_${slotId}" class="ko-result-select"><option value="">-- الفائز؟ --</option><option value="1" ${String(m.result)==='1'?'selected':''}>الفريق 1</option><option value="2" ${String(m.result)==='2'?'selected':''}>الفريق 2</option></select>
      <button class="ko-save-btn" onclick="saveKOSlot('${slotId}')">💾 حفظ النتيجة</button>
    </div>`;
  }).join('') + '</div>').join('');
}

async function saveKOSlot(slotId) {
  const t1 = document.getElementById('at1_'+slotId)?.value || '';
  const t2 = document.getElementById('at2_'+slotId)?.value || '';
  const result = document.getElementById('ares_'+slotId)?.value || '';
  const bm = BRACKET_BY_ID[slotId];

  await apiPost({action:'addKOMatch', id:slotId, round:bm?.round||'r32', team1:t1, team2:t2, date:bm?.date?.split('T')[0]||'', kickoff:bm?.date||''});
  if (result) {
    await apiPost({action:'setKOResult', matchId:slotId, result});
    const winnerName = result === '1' ? t1 : t2;
    const nextId = bm?.feeds;
    if (nextId && winnerName) {
      const nextBm = BRACKET_BY_ID[nextId]; const feeders = FEEDERS[nextId] || [];
      let nextMatch = (remoteData.koMatches||[]).find(m => m.id === nextId) || {id:nextId, round:nextBm?.round||'r16', team1:'', team2:''};
      if (feeders[0] === slotId) nextMatch.team1 = winnerName; else nextMatch.team2 = winnerName;
      await apiPost({action:'addKOMatch', id:nextId, round:nextBm?.round||'r16', team1:nextMatch.team1, team2:nextMatch.team2, date:nextBm?.date?.split('T')[0]||'', kickoff:nextBm?.date||''});
    }
  }
  showToast('تم حفظ النتيجة ✓'); await fetchData();
}

function switchTab(t) {
  ['matches','knockout','leaderboard','admin'].forEach(id => { const el = document.getElementById('tab-'+id); if(el) el.style.display = id===t?'block':'none'; });
  const tabNames = ['matches','knockout','leaderboard','admin'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabNames[i]===t));
  if(t==='leaderboard') renderLeaderboard(); if(t==='knockout') renderKnockout(); if(t==='admin') { renderResultsAdmin(); renderKnockoutAdmin(); }
}

function showToast(m, type='success') { const t = document.getElementById('toast'); t.textContent = m; t.className = `show ${type}`; setTimeout(() => t.classList.remove('show'), 3000); }

function updateUI() {
  const loggedIn = !!API_URL && currentUser;
  document.getElementById('setup-screen').style.display = API_URL ? 'none' : 'block';
  document.getElementById('register-section').style.display = (!API_URL || currentUser) ? 'none' : 'block';
  document.getElementById('welcome-badge').style.display = loggedIn ? 'flex' : 'none';
  document.getElementById('main-tabs').style.display = loggedIn ? 'flex' : 'none';
  if (loggedIn) { document.getElementById('display-name').textContent = currentUser; document.getElementById('avatar-letter').textContent = currentUser[0]; switchTab('matches'); }
}

let prevStats = {};
setInterval(() => {
  BRACKET.forEach(bm => {
    const m = (remoteData.koMatches||[]).find(x => x.id === bm.id) || {}; const koTime = m.kickoff || bm.date;
    const cd = getMatchStatus(koTime)==='open' ? formatCountdown(koTime) : '';
    const mini = document.getElementById('kocd_'+bm.id); if(mini) mini.textContent = cd;
    if(activeKOMatch === bm.id) { const big = document.getElementById('kodet_'+bm.id); if(big) big.textContent = cd; }
    const st = getMatchStatus(koTime); if(prevStats[bm.id] && prevStats[bm.id] !== st) { renderMatches(); renderKnockout(); } prevStats[bm.id] = st;
  });
}, 1000);

updateUI();
if(API_URL) fetchData();
</script>
</body>
</html>
