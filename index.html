<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توقعات كأس العالم 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F1C;
    --card: #111827;
    --card2: #1A2744;
    --gold: #C9A84C;
    --gold-light: #E8C96E;
    --text: #E8EDF5;
    --muted: #8892A4;
    --green: #2ECC71;
    --red: #E74C3C;
    --draw: #F39C12;
    --border: rgba(201,168,76,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(26,39,68,0.8) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
  }
  .trophy-row {
    font-size: 48px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
  }
  header h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
    font-weight: 300;
  }

  /* LIVE CLOCK */
  #live-clock {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    font-variant-numeric: tabular-nums;
    direction: ltr;
  }

  /* CONTAINER */
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

  /* REGISTRATION */
  #register-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    margin: 24px 0;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  #register-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  #register-section h2 {
    font-size: 22px; font-weight: 700; margin-bottom: 6px;
  }
  #register-section p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .input-row {
    display: flex; gap: 10px; max-width: 360px; margin: 0 auto;
  }
  .input-row input {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--gold); }
  .input-row input::placeholder { color: var(--muted); }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #a8853a);
    color: #0A0F1C;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 12px;
    padding: 12px 22px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-gold:active { transform: translateY(0); }

  /* WELCOME BADGE */
  #welcome-badge {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    margin: 0 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: space-between;
  }
  #welcome-badge .left { display: flex; align-items: center; gap: 10px; }
  #welcome-badge .avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--gold), #a8853a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #0A0F1C;
  }
  #welcome-badge .name { font-weight: 700; font-size: 16px; }
  #welcome-badge .sub { font-size: 12px; color: var(--muted); }
  #welcome-badge .points-pill {
    background: var(--card2);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 20px;
    font-size: 14px; font-weight: 700; color: var(--gold);
  }

  /* SECTION TITLE */
  .section-title {
    display: flex; align-items: center; gap: 10px;
    margin: 28px 0 14px;
    font-size: 13px; font-weight: 500;
    color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
  }
  .section-title::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* MATCH TICKET CARD */
  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin-bottom: 14px;
    overflow: hidden;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .match-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

  /* Ticket stub effect */
  .match-card::before {
    content: '';
    position: absolute;
    right: 110px; top: 0; bottom: 0; width: 1px;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 4px, rgba(201,168,76,0.15) 4px, rgba(201,168,76,0.15) 6px);
  }

  .match-header {
    background: var(--card2);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
  }
  .match-header .group { color: var(--gold); font-weight: 700; letter-spacing: 1px; }
  .match-header .time { color: var(--muted); direction: ltr; }
  .status-badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }
  .status-open { background: rgba(46,204,113,0.15); color: var(--green); }
  .status-locked { background: rgba(231,76,60,0.15); color: var(--red); }
  .status-soon { background: rgba(243,156,18,0.15); color: var(--draw); }
  .status-closed { background: rgba(136,146,164,0.15); color: var(--muted); }

  .match-body { padding: 18px 16px; }

  .teams-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .team {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    flex: 1; text-align: center;
  }
  .team-flag { font-size: 36px; line-height: 1; }
  .team-name { font-size: 15px; font-weight: 700; }
  .team-code { font-size: 11px; color: var(--muted); font-weight: 300; direction: ltr; }

  .vs-box {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 50px;
  }
  .vs-text { font-size: 11px; color: var(--muted); font-weight: 300; }
  .match-date-small { font-size: 11px; color: var(--muted); direction: ltr; text-align: center; }

  /* PREDICTION BUTTONS */
  .predict-row {
    display: flex; gap: 8px; margin-top: 16px;
  }
  .pred-btn {
    flex: 1;
    background: var(--card2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text);
    transition: all 0.2s;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .pred-btn .label { font-size: 11px; font-weight: 400; color: var(--muted); }
  .pred-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .pred-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .pred-btn.selected-home { border-color: var(--green); background: rgba(46,204,113,0.1); color: var(--green); }
  .pred-btn.selected-home .label { color: var(--green); }
  .pred-btn.selected-draw { border-color: var(--draw); background: rgba(243,156,18,0.1); color: var(--draw); }
  .pred-btn.selected-draw .label { color: var(--draw); }
  .pred-btn.selected-away { border-color: var(--red); background: rgba(231,76,60,0.1); color: var(--red); }
  .pred-btn.selected-away .label { color: var(--red); }

  /* Predictions preview under the card */
  .predictions-preview {
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .predictions-preview .pred-label { font-size: 11px; color: var(--muted); margin-left: 4px; }
  .pred-chip {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500;
  }
  .chip-home { background: rgba(46,204,113,0.12); color: var(--green); }
  .chip-draw { background: rgba(243,156,18,0.12); color: var(--draw); }
  .chip-away { background: rgba(231,76,60,0.12); color: var(--red); }

  /* LEADERBOARD */
  #leaderboard-section { margin-top: 12px; }

  .lb-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    transition: transform 0.1s;
  }
  .lb-row:hover { transform: translateX(-2px); }
  .lb-rank {
    font-size: 18px; font-weight: 900; width: 28px; text-align: center;
    color: var(--muted);
  }
  .lb-rank.gold { color: #FFD700; }
  .lb-rank.silver { color: #C0C0C0; }
  .lb-rank.bronze { color: #CD7F32; }
  .lb-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; color: var(--gold);
  }
  .lb-name { flex: 1; font-size: 15px; font-weight: 600; }
  .lb-pts { font-size: 18px; font-weight: 900; color: var(--gold); }
  .lb-pts-label { font-size: 11px; color: var(--muted); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 14px;
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 24px;
    font-size: 14px; font-weight: 600;
    transition: transform 0.3s ease;
    z-index: 999; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: rgba(46,204,113,0.4); color: var(--green); }
  #toast.error { border-color: rgba(231,76,60,0.4); color: var(--red); }

  /* TABS */
  .tabs {
    display: flex; gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 4px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1; background: transparent; border: none;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--muted); padding: 10px;
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active { background: var(--card2); color: var(--gold); }

  /* COUNTDOWN */
  .countdown-box {
    font-size: 12px; color: var(--draw);
    margin-top: 4px; direction: ltr; font-variant-numeric: tabular-nums;
  }

  /* MOBILE */
  @media(max-width:480px) {
    .input-row { flex-direction: column; }
    .match-card::before { display: none; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="trophy-row">🏆</div>
  <h1>توقعات كأس العالم</h1>
  <p>توقّع نتائج المباريات وتنافس مع أصحابك</p>
  <div id="live-clock"></div>
</header>

<div class="container">

  <!-- REGISTER -->
  <div id="register-section">
    <h2>انضم للتحدي</h2>
    <p>أدخل اسمك وابدأ التوقعات</p>
    <div class="input-row">
      <input type="text" id="name-input" placeholder="اسمك هنا..." maxlength="24" />
      <button class="btn-gold" onclick="registerUser()">دخول</button>
    </div>
  </div>

  <!-- WELCOME (hidden until login) -->
  <div id="welcome-badge" style="display:none">
    <div class="left">
      <div class="avatar" id="avatar-letter">؟</div>
      <div>
        <div class="name" id="display-name">-</div>
        <div class="sub">جاهز للتوقع؟</div>
      </div>
    </div>
    <div>
      <div class="points-pill" id="points-display">0 نقطة</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('matches')">المباريات</button>
    <button class="tab-btn" onclick="switchTab('leaderboard')">الترتيب</button>
    <button class="tab-btn" onclick="switchTab('admin')">⚙️ إدارة</button>
  </div>

  <!-- MATCHES TAB -->
  <div id="tab-matches">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">
      <select id="filter-group" onchange="renderMatches()"
        style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-family:Tajawal;font-size:13px;outline:none;flex:1;min-width:130px;">
        <option value="">كل المجموعات</option>
        <option>المجموعة A</option><option>المجموعة B</option><option>المجموعة C</option>
        <option>المجموعة D</option><option>المجموعة E</option><option>المجموعة F</option>
        <option>المجموعة G</option><option>المجموعة H</option><option>المجموعة I</option>
        <option>المجموعة J</option><option>المجموعة K</option><option>المجموعة L</option>
        <option>المجموعة M</option><option>المجموعة N</option>
      </select>
      <select id="filter-status" onchange="renderMatches()"
        style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-family:Tajawal;font-size:13px;outline:none;flex:1;min-width:130px;">
        <option value="">كل الحالات</option>
        <option value="open">مفتوحة الآن</option>
        <option value="soon">قادمة</option>
        <option value="closed">انتهت</option>
      </select>
    </div>
    <div class="section-title">المباريات</div>
    <div id="matches-list"></div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div id="tab-leaderboard" style="display:none">
    <div class="section-title">لوحة الترتيب</div>
    <div id="leaderboard-list"></div>
  </div>

  <!-- ADMIN TAB -->
  <div id="tab-admin" style="display:none">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;">
      <h3 style="margin-bottom:16px;font-size:18px;">إضافة مباراة جديدة</h3>
      <div style="display:grid;gap:10px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">الفريق الأول (مثل 🇸🇦 المملكة)</label>
            <input id="team1-flag" placeholder="🇸🇦" maxlength="4" style="width:60px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:18px;font-family:Tajawal;outline:none;text-align:center;">
            <input id="team1-name" placeholder="المملكة" style="width:calc(100% - 68px);background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:Tajawal;font-size:14px;outline:none;margin-right:6px;">
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">الفريق الثاني</label>
            <input id="team2-flag" placeholder="🇧🇷" maxlength="4" style="width:60px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:18px;font-family:Tajawal;outline:none;text-align:center;">
            <input id="team2-name" placeholder="البرازيل" style="width:calc(100% - 68px);background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:Tajawal;font-size:14px;outline:none;margin-right:6px;">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">تاريخ ووقت الكيك أوف</label>
            <input id="match-datetime" type="datetime-local" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:Tajawal;font-size:14px;outline:none;">
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">المجموعة / الدور</label>
            <input id="match-group" placeholder="مثل: المجموعة A" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:Tajawal;font-size:14px;outline:none;">
          </div>
        </div>
        <button class="btn-gold" onclick="addMatch()" style="width:100%;">إضافة المباراة</button>
      </div>

      <hr style="border-color:var(--border);margin:20px 0;">

      <h3 style="margin-bottom:12px;font-size:18px;">إدخال نتائج المباريات</h3>
      <div id="results-admin"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ===================== DATA =====================
let state = {
  currentUser: null,
  matches: [],
  users: {},       // { name: { predictions: {matchId: 'home'|'draw'|'away'}, points: 0 } }
};

function loadState() {
  const saved = localStorage.getItem('wc2026_state');
  if (saved) {
    try { state = JSON.parse(saved); } catch(e) {}
  }
  // Load full WC 2026 schedule if no matches saved yet
  if (!state.matches || state.matches.length === 0) {
    // All times are Mecca time (UTC+3). We store as UTC.
    // Helper: mecca time YYYY-MM-DD HH:MM → UTC ISO string
    function mecca(date, hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      const d = new Date(`${date}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00+03:00`);
      return d.toISOString();
    }
    let mid = 1;
    const M = (g, f1, n1, f2, n2, date, time) => ({
      id: 'm' + (mid++), group: g, result: null,
      team1: { flag: f1, name: n1 }, team2: { flag: f2, name: n2 },
      kickoff: mecca(date, time)
    });

    state.matches = [
      // ===== الجولة الأولى =====
      // الخميس 11 يونيو
      M('المجموعة A','🇲🇽','المكسيك','🇿🇦','جنوب أفريقيا','2026-06-11','22:00'),
      // الجمعة 12 يونيو
      M('المجموعة B','🇰🇷','كوريا الجنوبية','🇨🇿','التشيك','2026-06-12','05:00'),
      M('المجموعة C','🇨🇦','كندا','🇧🇦','البوسنة والهرسك','2026-06-12','22:00'),
      // السبت 13 يونيو
      M('المجموعة D','🇺🇸','أمريكا','🇺🇾','أوروغواي','2026-06-13','04:00'),
      M('المجموعة A','🇨🇭','سويسرا','🇶🇦','قطر','2026-06-13','22:00'),
      // الأحد 14 يونيو
      M('المجموعة C','🇧🇷','البرازيل','🇲🇦','المغرب','2026-06-14','01:00'),
      M('المجموعة B','🏴󠁧󠁢󠁳󠁣󠁴󠁿','اسكتلندا','🇭🇹','هايتي','2026-06-14','04:00'),
      M('المجموعة E','🇹🇷','تركيا','🇦🇺','أستراليا','2026-06-14','07:00'),
      M('المجموعة F','🇩🇪','ألمانيا','🇨🇼','كوراساو','2026-06-14','20:00'),
      M('المجموعة E','🇯🇵','اليابان','🇳🇱','هولندا','2026-06-14','23:00'),

// ===================== TIME =====================
function getMatchStatus(kickoffISO) {
  const now = Date.now();
  const kick = new Date(kickoffISO).getTime();
  const diff = kick - now; // ms until kickoff
  const hours4 = 4 * 60 * 60 * 1000;
  const hours1 = 1 * 60 * 60 * 1000;

  if (diff > hours4) return 'soon';         // Not open yet (> 4h away)
  if (diff > hours1) return 'open';         // Open for predictions (1–4h window)
  if (diff > 0) return 'locked';            // < 1h, locked
  return 'closed';                          // Match started or past
}

function formatKickoff(iso) {
  const d = new Date(iso);
  return d.toLocaleString('ar-SA', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatCountdown(kickoffISO) {
  const diff = new Date(kickoffISO).getTime() - Date.now();
  if (diff <= 0) return '';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function statusLabel(status) {
  if (status === 'open') return '<span class="status-badge status-open">مفتوح للتوقع ✓</span>';
  if (status === 'locked') return '<span class="status-badge status-locked">مغلق ✗</span>';
  if (status === 'soon') return '<span class="status-badge status-soon">يفتح قريباً</span>';
  return '<span class="status-badge status-closed">انتهت</span>';
}

// ===================== REGISTER =====================
function registerUser() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { showToast('اكتب اسمك أول!', 'error'); return; }
  if (name.length < 2) { showToast('الاسم قصير جداً', 'error'); return; }

  state.currentUser = name;
  if (!state.users[name]) {
    state.users[name] = { predictions: {}, points: 0 };
  }
  saveState();
  updateUI();
  showToast(`أهلاً ${name}! 🎉`, 'success');
}

// ===================== PREDICT =====================
function predict(matchId, choice) {
  if (!state.currentUser) { showToast('سجل اسمك أول', 'error'); return; }
  const match = state.matches.find(m => m.id === matchId);
  if (!match) return;
  const status = getMatchStatus(match.kickoff);
  if (status !== 'open') { showToast('التوقعات مغلقة لهذه المباراة', 'error'); return; }

  state.users[state.currentUser].predictions[matchId] = choice;
  saveState();
  renderMatches();
  showToast('تم حفظ توقعك ✓', 'success');
}

// ===================== RENDER MATCHES =====================
function renderMatches() {
  const container = document.getElementById('matches-list');
  if (!state.matches || state.matches.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">⚽</div>لا توجد مباريات مضافة بعد</div>`;
    return;
  }

  const groupFilter = document.getElementById('filter-group')?.value || '';
  const statusFilter = document.getElementById('filter-status')?.value || '';
  let filtered = [...state.matches].sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));
  if (groupFilter) filtered = filtered.filter(m => m.group === groupFilter);
  if (statusFilter) filtered = filtered.filter(m => getMatchStatus(m.kickoff) === statusFilter);
  const sorted = filtered;

  container.innerHTML = sorted.map(match => {
    const status = getMatchStatus(match.kickoff);
    const userPred = state.currentUser && state.users[state.currentUser]
      ? (state.users[state.currentUser].predictions[match.id] || null)
      : null;

    // All predictions for this match
    const allPreds = Object.entries(state.users).map(([name, u]) => ({
      name, pred: u.predictions[match.id]
    })).filter(p => p.pred);
    const homeCount = allPreds.filter(p => p.pred === 'home').length;
    const drawCount = allPreds.filter(p => p.pred === 'draw').length;
    const awayCount = allPreds.filter(p => p.pred === 'away').length;

    const isOpen = status === 'open';
    const countdown = (status === 'soon' || status === 'open' || status === 'locked') ? formatCountdown(match.kickoff) : '';
    const countdownLabel = status === 'soon' ? 'يفتح بعد' : status === 'locked' ? 'تبدأ بعد' : status === 'open' ? 'تغلق بعد' : '';

    const homeSelected = userPred === 'home' ? 'selected-home' : '';
    const drawSelected = userPred === 'draw' ? 'selected-draw' : '';
    const awaySelected = userPred === 'away' ? 'selected-away' : '';
    const disabled = !isOpen || !state.currentUser ? 'disabled' : '';

    const resultBadge = match.result ? `
      <div style="text-align:center;margin-top:10px;font-size:13px;color:var(--muted);">
        النتيجة: <strong style="color:var(--gold)">${match.result === 'home' ? match.team1.name + ' فاز' : match.result === 'away' ? match.team2.name + ' فاز' : 'تعادل'}</strong>
      </div>` : '';

    const predsSection = allPreds.length > 0 ? `
      <div class="predictions-preview">
        <span class="pred-label">توقعات:</span>
        ${homeCount > 0 ? `<span class="pred-chip chip-home">${match.team1.flag} ${homeCount}</span>` : ''}
        ${drawCount > 0 ? `<span class="pred-chip chip-draw">تعادل ${drawCount}</span>` : ''}
        ${awayCount > 0 ? `<span class="pred-chip chip-away">${match.team2.flag} ${awayCount}</span>` : ''}
      </div>` : '';

    return `
    <div class="match-card">
      <div class="match-header">
        <span class="group">${match.group}</span>
        ${statusLabel(status)}
        <span class="time">${formatKickoff(match.kickoff)}</span>
      </div>
      <div class="match-body">
        <div class="teams-row">
          <div class="team">
            <div class="team-flag">${match.team1.flag}</div>
            <div class="team-name">${match.team1.name}</div>
          </div>
          <div class="vs-box">
            <div class="vs-text">VS</div>
            ${countdown ? `<div class="countdown-box" id="cd_${match.id}">${countdownLabel}</div>` : ''}
          </div>
          <div class="team">
            <div class="team-flag">${match.team2.flag}</div>
            <div class="team-name">${match.team2.name}</div>
          </div>
        </div>

        <div class="predict-row">
          <button class="pred-btn ${homeSelected}" ${disabled} onclick="predict('${match.id}','home')">
            ${match.team1.flag}
            <span class="label">${match.team1.name} يفوز</span>
          </button>
          <button class="pred-btn ${drawSelected}" ${disabled} onclick="predict('${match.id}','draw')">
            🤝
            <span class="label">تعادل</span>
          </button>
          <button class="pred-btn ${awaySelected}" ${disabled} onclick="predict('${match.id}','away')">
            ${match.team2.flag}
            <span class="label">${match.team2.name} يفوز</span>
          </button>
        </div>
        ${resultBadge}
      </div>
      ${predsSection}
    </div>`;
  }).join('');
}

// ===================== LEADERBOARD =====================
function renderLeaderboard() {
  const container = document.getElementById('leaderboard-list');
  const users = Object.entries(state.users)
    .map(([name, u]) => ({ name, points: u.points || 0, total: Object.keys(u.predictions).length }))
    .sort((a, b) => b.points - a.points || b.total - a.total);

  if (users.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🏅</div>لا يوجد مشاركون بعد</div>`;
    return;
  }

  const medals = ['🥇', '🥈', '🥉'];
  const rankClass = ['gold', 'silver', 'bronze'];

  container.innerHTML = users.map((u, i) => `
    <div class="lb-row">
      <div class="lb-rank ${rankClass[i] || ''}">${medals[i] || (i + 1)}</div>
      <div class="lb-avatar">${u.name[0]}</div>
      <div class="lb-name">${u.name}
        <div style="font-size:11px;color:var(--muted);font-weight:400">${u.total} توقع</div>
      </div>
      <div style="text-align:center">
        <div class="lb-pts">${u.points}</div>
        <div class="lb-pts-label">نقطة</div>
      </div>
    </div>
  `).join('');
}

// ===================== ADMIN =====================
function addMatch() {
  const flag1 = document.getElementById('team1-flag').value.trim() || '🏳️';
  const name1 = document.getElementById('team1-name').value.trim();
  const flag2 = document.getElementById('team2-flag').value.trim() || '🏳️';
  const name2 = document.getElementById('team2-name').value.trim();
  const dt = document.getElementById('match-datetime').value;
  const group = document.getElementById('match-group').value.trim() || 'المجموعة';

  if (!name1 || !name2 || !dt) { showToast('اكمل البيانات', 'error'); return; }

  const id = 'm' + Date.now();
  state.matches.push({
    id, group, result: null,
    team1: { flag: flag1, name: name1 },
    team2: { flag: flag2, name: name2 },
    kickoff: new Date(dt).toISOString()
  });
  saveState();
  renderMatches();
  renderResultsAdmin();
  showToast('تمت إضافة المباراة ✓', 'success');
  ['team1-flag','team1-name','team2-flag','team2-name','match-datetime','match-group'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function renderResultsAdmin() {
  const container = document.getElementById('results-admin');
  if (!state.matches || state.matches.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);font-size:13px">لا توجد مباريات</p>';
    return;
  }
  container.innerHTML = state.matches.map(m => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <span style="font-size:14px;flex:1;">${m.team1.flag} ${m.team1.name} vs ${m.team2.flag} ${m.team2.name}</span>
      <select onchange="setResult('${m.id}', this.value)"
        style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:Tajawal;font-size:13px;outline:none;">
        <option value="" ${!m.result ? 'selected' : ''}>-- النتيجة --</option>
        <option value="home" ${m.result==='home'?'selected':''}>فوز ${m.team1.name}</option>
        <option value="draw" ${m.result==='draw'?'selected':''}>تعادل</option>
        <option value="away" ${m.result==='away'?'selected':''}>فوز ${m.team2.name}</option>
      </select>
    </div>
  `).join('');
}

function setResult(matchId, result) {
  if (!result) return;
  const match = state.matches.find(m => m.id === matchId);
  if (!match) return;
  match.result = result;

  // Calculate points
  Object.entries(state.users).forEach(([name, u]) => {
    const pred = u.predictions[matchId];
    if (pred && pred === result) {
      u.points = (u.points || 0) + 3;
    }
  });

  saveState();
  renderMatches();
  renderLeaderboard();
  showToast('تم تسجيل النتيجة وحساب النقاط ✓', 'success');
}

// ===================== UI =====================
function updateUI() {
  const u = state.currentUser;
  const regSection = document.getElementById('register-section');
  const welcomeBadge = document.getElementById('welcome-badge');

  if (u) {
    regSection.style.display = 'none';
    welcomeBadge.style.display = 'flex';
    document.getElementById('display-name').textContent = u;
    document.getElementById('avatar-letter').textContent = u[0];
    const pts = state.users[u]?.points || 0;
    document.getElementById('points-display').textContent = pts + ' نقطة';
  } else {
    regSection.style.display = 'block';
    welcomeBadge.style.display = 'none';
  }

  renderMatches();
  renderLeaderboard();
  renderResultsAdmin();
}

function switchTab(tab) {
  document.getElementById('tab-matches').style.display = tab === 'matches' ? 'block' : 'none';
  document.getElementById('tab-leaderboard').style.display = tab === 'leaderboard' ? 'block' : 'none';
  document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['matches','leaderboard','admin'][i] === tab);
  });
  if (tab === 'leaderboard') renderLeaderboard();
  if (tab === 'admin') renderResultsAdmin();
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===================== CLOCK + COUNTDOWNS =====================
function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent =
    now.toLocaleString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

let lastStatuses = {};
function tickCountdowns() {
  if (!state.matches) return;
  state.matches.forEach(m => {
    const el = document.getElementById('cd_' + m.id);
    if (!el) return;
    const status = getMatchStatus(m.kickoff);
    const cd = formatCountdown(m.kickoff);
    const label = status === 'soon' ? 'يفتح بعد ' : status === 'locked' ? 'تبدأ بعد ' : status === 'open' ? 'تغلق بعد ' : '';
    if (cd) el.textContent = label + cd;

    // Re-render if status changed
    if (lastStatuses[m.id] !== status) {
      lastStatuses[m.id] = status;
      renderMatches();
    }
  });
}

// ===================== ENTER KEY =====================
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') registerUser();
});

// ===================== INIT =====================
loadState();
updateUI();
updateClock();
setInterval(updateClock, 1000);
setInterval(tickCountdowns, 1000);
</script>
</body>
</html>
